<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGMI - Hall of Shame</title>
  <meta name="description" content="Every soul who burned an NFT to join NGMI. Names, faces, follower counts, body count." />
  <meta property="og:title" content="NGMI - Hall of Shame" />
  <meta property="og:description" content="The rugged, by name. Who burned what, and how many followers watched them do it." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=52" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230b0b0b'/><text x='50' y='72' font-size='62' font-family='monospace' font-weight='bold' fill='%23c6f24e' text-anchor='middle'>N</text></svg>" />
  <style>
    .shame { max-width: 1180px; margin: 0 auto; padding: 24px clamp(14px,4vw,40px) 90px; }
    .shame__kick { font-family: var(--mono); font-size: 12px; letter-spacing: .06em; color: var(--rug); font-weight: 700; }
    .shame__title { font-family: var(--poster); font-weight: 400; font-size: clamp(40px,8vw,80px); line-height: .88; margin: 6px 0 10px; text-transform: uppercase; }
    .shame__lead { color: var(--ink-soft); max-width: 660px; font-size: 15px; line-height: 1.55; margin: 0 0 22px; }
    .shame__lead b { color: var(--ink); }

    .shame__grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(286px, 1fr)); gap: 18px; }
    /* ---- case-file / mugshot card ---- */
    .scard { position: relative; background: #e9e2cf; border: 2.5px solid var(--ink); border-radius: 4px; box-shadow: 6px 6px 0 var(--ink); overflow: hidden; }
    .scard--wl { box-shadow: 6px 6px 0 var(--acid); }
    .scard__top { display: flex; justify-content: space-between; align-items: center; background: var(--ink); color: #e9e2cf; padding: 7px 13px; font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 1.5px; }
    .scard__case { color: var(--acid); }
    .scard--1 .scard__case, .scard--2 .scard__case, .scard--3 .scard__case { color: #ff5a3c; }
    .scard__tag { opacity: .5; }
    .scard__wl2 { background: var(--acid); color: var(--acid-ink); padding: 1px 8px; border-radius: 3px; font-size: 10px; letter-spacing: 1px; }
    .scard__body { display: flex; gap: 13px; padding: 15px 14px 6px; }
    .scard__mugwrap { flex: none; width: 90px; }
    .scard__mug { position: relative; width: 90px; height: 90px; border: 2px solid var(--ink); overflow: hidden; background: #d9d1b8; }
    .scard__mug .ph { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--poster); color: #fff; font-size: 34px; }
    .scard__mug .lines { position: absolute; inset: 0; z-index: 1; background: repeating-linear-gradient(to bottom, transparent 0 15px, rgba(0,0,0,.18) 15px 16px); pointer-events: none; }
    .scard__mug img { position: absolute; inset: 0; z-index: 2; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity .2s; }
    .scard__mug img.on { opacity: 1; }
    .scard__plate { font-family: var(--mono); font-weight: 700; font-size: 9px; text-align: center; background: var(--ink); color: #e9e2cf; padding: 3px 0; letter-spacing: 1.5px; border: 2px solid var(--ink); border-top: none; }
    .scard__info { min-width: 0; flex: 1; padding-top: 1px; }
    .scard__name { font-family: var(--font); font-weight: 900; font-size: 15px; line-height: 1.08; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
    .scard__handle { font-family: var(--mono); font-size: 12px; color: #2a52c4; text-decoration: none; }
    .scard__handle:hover { text-decoration: underline; }
    .scard__stats { display: flex; gap: 8px; margin-top: 12px; }
    .scard__stat { flex: 1; border: 1.5px solid var(--ink); background: #f3eedd; padding: 5px 8px; }
    .scard__stat > span { display: block; font-family: var(--mono); font-size: 8.5px; letter-spacing: .5px; color: var(--ink-soft); text-transform: uppercase; }
    .scard__stat b { font-family: var(--poster); font-weight: 400; font-size: 23px; line-height: 1; color: var(--rug); display: flex; align-items: center; min-height: 23px; }
    .scard__stat.w b { color: var(--ink); }
    .scard__stat .redact { display: inline-block; width: 46px; height: 14px; background: var(--ink); border-radius: 2px; }
    .scard__ev { padding: 12px 14px 15px; }
    .scard__ev-l { font-family: var(--mono); font-size: 8.5px; letter-spacing: 1px; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 6px; }
    .scard__chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .scard__chip { font-family: var(--mono); font-size: 10px; border: 1.5px solid var(--ink); background: #fff; border-radius: 2px; padding: 1.5px 7px; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .shame__empty { font-family: var(--mono); color: var(--ink-soft); padding: 50px 16px; text-align: center; }
  </style>
</head>
<body>
  <header class="nav">
    <a class="nav__brand" href="/"><span class="nav__mark">NG</span><span class="nav__name">MI</span></a>
    <nav class="nav__links">
      <a href="/">Home</a>
      <a href="/manifesto">Manifesto</a>
      <a href="/collection">Collection</a>
      <a href="/rugmuseum">Museum</a>
      <a href="/hall-of-shame">Shame</a>
      <a href="/tasks">Farm</a>
      <a href="/roadmap">Roadmap</a>
    </nav>
    <div class="nav__right">
      <span class="nav__user" id="navUser"></span>
    </div>
    <button class="nav__toggle" id="navToggle" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </header>

  <main class="shame">
    <span class="shame__kick">// THE RUGGED, BY NAME</span>
    <h1 class="shame__title">Hall of Shame</h1>
    <p class="shame__lead">Everyone who publicly burned an NFT to join NGMI - face, handle, follower
      count, and body count. <b>They did this on purpose, in front of everyone.</b> Ranked by bags
      incinerated.</p>
    <div class="shame__grid" id="grid"><div class="shame__empty" id="empty">Loading the rugged…</div></div>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const big = (u) => (u ? u.replace("_normal", "_400x400") : "");
    const hue = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360; return h; };
    const num = (n) => { n = Number(n || 0); return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "K" : String(n); };

    function card(u, i) {
      const handle = String(u.handle || "").replace(/^@/, "");
      const rank = i + 1;
      const initial = esc((u.name || handle || "?").slice(0, 1).toUpperCase());
      // Colored initial-avatar shows instantly; the real X pfp (stored, or resolved by handle via
      // unavatar) fades in on top when/if it loads. No black loading circles, ever.
      const src = u.avatar ? big(u.avatar) : `https://unavatar.io/twitter/${encodeURIComponent(handle)}?fallback=false`;
      const bg = `hsl(${hue(handle || initial)},46%,42%)`;
      // Followers are only captured for free at X login. Unknown -> a redacted bar (on brand for a case file).
      const followers = u.followers
        ? `<b>${num(u.followers)}</b>`
        : `<b><span class="redact" title="not captured at login"></span></b>`;
      const colls = (u.collections || []).filter(Boolean).slice(0, 5)
        .map(c => `<span class="scard__chip">${esc(c)}</span>`).join("");
      const wl = u.status === "approved";
      return `<div class="scard scard--${rank}${wl ? " scard--wl" : ""}">
        <div class="scard__top"><span class="scard__case">CASE #${rank}</span>${wl ? `<span class="scard__wl2">WHITELISTED</span>` : `<span class="scard__tag">SUSPECT</span>`}</div>
        <div class="scard__body">
          <div class="scard__mugwrap">
            <div class="scard__mug"><div class="ph" style="background:${bg}">${initial}</div><div class="lines"></div><img src="${esc(src)}" alt="" loading="lazy" onload="this.classList.add('on')" onerror="this.remove()" /></div>
            <div class="scard__plate">RUGGEE</div>
          </div>
          <div class="scard__info">
            <div class="scard__name">${esc(u.name || handle)}</div>
            <a class="scard__handle" href="https://x.com/${esc(handle)}" target="_blank" rel="noopener">@${esc(handle)}</a>
            <div class="scard__stats">
              <div class="scard__stat"><span>bags burned</span><b>${u.burn_count || 0}</b></div>
              <div class="scard__stat w"><span>witnesses</span>${followers}</div>
            </div>
          </div>
        </div>
        ${colls ? `<div class="scard__ev"><div class="scard__ev-l">// evidence incinerated</div><div class="scard__chips">${colls}</div></div>` : ""}
      </div>`;
    }

    async function load(bust) {
      try {
        const r = await fetch("/api/hallofshame" + (bust ? "?t=" + Date.now() : ""));
        const d = await r.json().catch(() => ({}));
        if (r.status === 503 || d.warming) { const e = $("#empty"); if (e) e.textContent = "Waking the database…"; return setTimeout(() => load(true), 2500); }
        const rows = d.rows || [];
        if (!rows.length) { $("#grid").innerHTML = `<div class="shame__empty">Nobody has burned a bag yet. The hall awaits its first fool.</div>`; return; }
        $("#grid").innerHTML = rows.map(card).join("");
      } catch { $("#grid").innerHTML = `<div class="shame__empty">Could not load. Refresh.</div>`; }
    }
    load();

    (async () => {
      try {
        const r = await fetch("/auth/me", { headers: { Accept: "application/json" } });
        if (!r.ok) return; const u = (await r.json()).user; if (!u) return;
        const el = $("#navUser"); if (!el) return;
        const txt = "@" + u.username;
        const btn = document.createElement("button");
        btn.type = "button"; btn.className = "nav__userbtn"; btn.title = "Copy username + open dashboard"; btn.textContent = txt;
        btn.onclick = () => { (navigator.clipboard ? navigator.clipboard.writeText(txt) : Promise.reject()).then(() => { btn.classList.add("copied"); btn.textContent = "copied ✓"; setTimeout(() => { window.location.href = "/apply"; }, 550); }).catch(() => { window.location.href = "/apply"; }); };
        el.innerHTML = ""; el.appendChild(btn);
      } catch {}
    })();
    (function () {
      const nav = document.querySelector(".nav"), tog = $("#navToggle");
      if (!nav || !tog) return;
      let p = location.pathname; if (p.length > 1 && p.slice(-1) === "/") p = p.slice(0, -1);
      nav.querySelectorAll(".nav__links a").forEach(a => { if (a.getAttribute("href") === p) a.classList.add("is-active"); });
      tog.onclick = () => { const o = nav.classList.toggle("nav--open"); tog.setAttribute("aria-expanded", o ? "true" : "false"); };
      nav.querySelectorAll(".nav__links a").forEach(a => a.addEventListener("click", () => nav.classList.remove("nav--open")));
    })();
  </script>
</body>
</html>
